name: Publish Standard Site

on:
    workflow_dispatch:
    workflow_run:
        workflows: ["Deploy to Cloudflare Pages"]
        types: [completed]

jobs:
    publish-standard-site:
        if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Publish to ATProto
              run: bun scripts/publish-standard-site.ts
              env:
                  ATP_HANDLE: ${{ secrets.ATP_HANDLE }}
                  ATP_APP_PASSWORD: ${{ secrets.ATP_APP_PASSWORD }}
