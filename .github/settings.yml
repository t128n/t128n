repository:
    name: t128n
    description: "TPO and SE in the automotive industry by day, FOSS & tech enthusiast by night. Developing and managing data and software systems."
    homepage: https://t128n.dev
    topics: foss, software-engineering, blog
    has_issues: true
    has_projects: false
    has_wiki: false
    has_pages: false
    has_downloads: false
    default_branch: main
    allow_squash_merge: true
    allow_merge_commit: false
    allow_rebase_merge: false
    delete_branch_on_merge: true
    enable_automated_security_fixes: true
    enable_vulnerability_alerts: true

labels:
    - name: bug
      color: d73a4a
      description: Something isn't working
    - name: inquiry
      color: 0075ca
      description: General questions or contact
    - name: enhancement
      color: a2eeef
      description: New feature or request
    - name: documentation
      color: 0075ca
      description: Improvements or additions to documentation

branches:
    - name: main
      protection:
          required_pull_request_reviews:
              required_approving_review_count: 0
              dismiss_stale_reviews: true
          required_status_checks:
              strict: true
              contexts: []
          enforce_admins: false
          required_linear_history: true
          allow_force_pushes: false
          allow_deletions: false
